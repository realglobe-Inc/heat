[project]
name = "heat"
version = "0.1.0"
description = "HEAT: Height Estimation and Attribute Transfer model"
authors = [
    {name = "fukuchidaisuke",email = "fukuchidaisuke@realglobe.jp"}
]
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "cython (>=3.1.2,<4.0.0)",
    "einops (>=0.8.1,<0.9.0)",
    "matplotlib (>=3.10.3,<4.0.0)",
    "numpy (>=2,<2.3.0)",
    "opencv-python (>=4.12.0.88,<5.0.0.0)",
    "pillow (>=11.3.0,<12.0.0)",
    "pyproj (>=3.7.1,<4.0.0)",
    "scikit-learn (>=1.7.0,<2.0.0)",
    "scipy (>=1.16.0,<2.0.0)",
    "shapely (>=2.1.1,<3.0.0)",
    "torch (>=2.7.1,<3.0.0)",
    "torchvision (>=0.22.1,<0.23.0)",
]

[project.urls]
"torch-stable" = "https://download.pytorch.org/whl/torch_stable.html"

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "heat"
version = "0.1.0"
description = "HEAT: Height Estimation and Attribute Transfer model"
authors = ["fukuchidaisuke <fukuchidaisuke@realglobe.jp>"]
packages = [{include = "heat", from = "src"}]

[tool.poetry.scripts]
heat-infer = "heat.infer:main"

[tool.poetry.group.dev.dependencies]
black = "^25.1.0"
scipy-stubs = "^1.16.0.2"

[tool.isort]
profile = "black"
